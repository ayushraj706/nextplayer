name: Android Release Build

on:
  workflow_dispatch: # Yahan se tum manually build start kar paoge

# Memory badhane ke liye taaki build crash na ho
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx5g -Dorg.gradle.daemon=false"

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # NAYA STEP: Fake Keystore generate karna sign karne ke liye
      - name: Generate Fake Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      # BUILD STEP: assembleDebug ko hata kar assembleRelease kar diya hai.
      # Faltu ke tests aur linting skip karne ke liye (-x test -x lint -x ktlintCheck) lagaya hai.
      - name: Build Project with gradle (Release)
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android -x lint -x test -x ktlintCheck

      # UPLOAD STEP: 5 alag alag steps likhne ke bajaye ek hi step me saare release APKs upload kar diye hain
      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 20
